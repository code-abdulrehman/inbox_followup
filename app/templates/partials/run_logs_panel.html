<div id="run-logs-panel" style="display:none;">
  <div class="section-header">
    <h2>Run Logs</h2>
    <span id="run-status-badge" class="badge badge-info">Running</span>
  </div>
  <div id="run-logs" class="run-logs">
    <div class="run-log-entry run-log-info">
      <span class="run-log-time">—</span>
      <span class="run-log-icon">{{ icon("loading") }}</span>
      <span class="run-log-msg">Waiting for logs...</span>
    </div>
  </div>
</div>
