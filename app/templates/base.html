<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox FollowUp{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/global.css?v=2">
  <script>
    (function(){
      var theme = localStorage.getItem('inbox-followup-theme');
      if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script src="/static/js/theme.js" defer></script>
  <script src="/static/js/toast.js" defer></script>
  <script src="/static/js/run-report.js" defer></script>
</head>
<body>
  {% include "partials/navbar.html" %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    async function apiFetch(url, options = {}) {
      const resp = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      const data = await resp.json();
      if (!resp.ok) {
        throw new Error(data.detail || `HTTP ${resp.status}`);
      }
      return data;
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
